<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberShop Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💈 BarberShop</h1>
        <p>Выберите услугу</p>
    </div>
    
    <div class="buttons-grid">
        <button class="btn" onclick="showMessage('Запись')">📅 Запись</button>
        <button class="btn btn-secondary" onclick="showMessage('Прическа')">✂️ Прическа</button>
        <button class="btn btn-secondary" onclick="showMessage('О нас')">ℹ️ О нас</button>
        <button class="btn btn-secondary" onclick="showMessage('Контакты')">📞 Контакты</button>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        function showMessage(action) {
            tg.showAlert('Кнопка: ' + action + '\n(Функционал в разработке)');
        }
    </script>
</body>
</html>
